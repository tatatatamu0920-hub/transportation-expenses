<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Expense - ID Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@500;600;700&display=swap');
        
        :root {
            --bg-main: #f8fafb;
            --card-white: #ffffff;
            --primary: #5e6ad2;
            --secondary: #f1f3f9;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Quicksand', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .soft-card {
            background: var(--card-white);
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        .input-elegant {
            background: var(--secondary);
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .input-elegant:focus {
            background: white;
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(94, 106, 210, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6e7be3 0%, #5e6ad2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(94, 106, 210, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(94, 106, 210, 0.4);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
        }

        .count-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="app" class="max-w-4xl mx-auto py-8 px-4">
        <!-- 認証画面 -->
        <div id="auth-screen" class="max-w-md mx-auto mt-12 soft-card p-8 md:p-10 fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 text-indigo-500 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Transport Hub</h1>
                <p class="text-slate-400 text-sm mt-1">Smart Expense Management</p>
            </div>

            <div class="flex p-1 bg-slate-100 rounded-xl mb-8">
                <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-bold bg-white text-indigo-600 rounded-lg shadow-sm">ログイン</button>
                <button onclick="switchAuthTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-bold text-slate-500 rounded-lg">新規登録</button>
            </div>

            <div id="login-form" class="space-y-5">
                <div class="relative">
                    <input type="text" id="login-id" list="id-list" class="w-full px-4 py-3.5 input-elegant" placeholder="ID / Email">
                    <datalist id="id-list"></datalist>
                </div>
                <input type="password" id="login-pw" class="w-full px-4 py-3.5 input-elegant" placeholder="Password">
                <button onclick="handleLogin()" class="w-full btn-primary py-4 rounded-xl font-bold mt-2">ログインする</button>
            </div>

            <div id="register-form" class="hidden space-y-5">
                <input type="text" id="reg-name" class="w-full px-4 py-3.5 input-elegant" placeholder="埼玉　太郎">
                <input type="email" id="reg-id" class="w-full px-4 py-3.5 input-elegant" placeholder="Email">
                <input type="password" id="reg-pw" class="w-full px-4 py-3.5 input-elegant" placeholder="Password">
                <button onclick="handleRegister()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold mt-2">利用申請を送る</button>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div id="main-content" class="hidden fade-in">
            <header class="flex justify-between items-center mb-8 px-2">
                <div>
                    <h1 class="text-xl font-bold text-slate-800" id="welcome-msg">こんにちは</h1>
                    <div id="role-badge" class="inline-block px-2 py-0.5 bg-indigo-50 text-indigo-500 rounded text-[9px] font-bold uppercase tracking-wider mt-1"></div>
                </div>
                <button onclick="handleLogout()" class="px-4 py-2 bg-white text-slate-400 hover:text-rose-500 border border-slate-100 rounded-xl text-xs font-bold transition-all shadow-sm">
                    ログアウト
                </button>
            </header>

            <!-- ユーザー画面 -->
            <section id="user-view" class="hidden space-y-8">
                <div class="soft-card p-6 md:p-8">
                    <form id="expense-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">利用日</label>
                                <input type="date" id="date" required class="w-full px-4 py-3 input-elegant">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">件名 / 目的</label>
                                <input type="text" id="subject" required class="w-full px-4 py-3 input-elegant" placeholder="例: ○○社 定期打ち合わせ">
                            </div>
                        </div>

                        <!-- 振込先情報 -->
                        <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            <h3 class="text-[11px] font-bold text-slate-400 uppercase mb-4 flex items-center gap-2">振込先情報</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" id="bank-name" placeholder="銀行名" required class="px-4 py-2.5 input-elegant text-sm">
                                <input type="text" id="branch-name" placeholder="支店名" required class="px-4 py-2.5 input-elegant text-sm">
                                <input type="text" id="account-number" placeholder="口座番号" required class="px-4 py-2.5 input-elegant text-sm">
                                <input type="text" id="account-holder" placeholder="口座名義（カナ）" required class="px-4 py-2.5 input-elegant text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="block text-[11px] font-bold text-slate-400 uppercase">ルート</label>
                                <input type="text" id="from-station" placeholder="出発地" required class="w-full px-4 py-3 input-elegant">
                                <input type="text" id="to-station" placeholder="目的地" required class="w-full px-4 py-3 input-elegant">
                            </div>
                            <div class="space-y-3">
                                <label class="block text-[11px] font-bold text-slate-400 uppercase">金額設定</label>
                                <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase">片道単価</span>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <span class="text-[10px] font-bold text-slate-400">往復</span>
                                            <input type="checkbox" id="round-trip" onchange="calculateAmount()" class="w-4 h-4 rounded text-indigo-600">
                                        </label>
                                    </div>
                                    <input type="number" id="unit-price" placeholder="0" required oninput="calculateAmount()" class="w-full bg-transparent text-3xl font-bold text-indigo-600 border-none text-center">
                                    <div class="mt-4 pt-4 border-t border-slate-200 flex justify-between">
                                        <span class="text-xs font-bold text-slate-400">合計</span>
                                        <span class="text-xl font-bold text-slate-700" id="total-display">¥ 0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold">申請を送信する</button>
                    </form>
                </div>

                <div class="soft-card overflow-hidden">
                    <div class="px-8 py-4 bg-slate-50/50 border-b border-slate-50">
                        <h2 class="text-sm font-bold text-slate-600">申請履歴</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] font-bold text-slate-400 uppercase bg-slate-50/30">
                                <tr>
                                    <th class="px-8 py-4">管理番号</th>
                                    <th class="px-8 py-4">日付</th>
                                    <th class="px-8 py-4">件名</th>
                                    <th class="px-8 py-4 text-right">金額</th>
                                    <th class="px-8 py-4 text-center">状態</th>
                                </tr>
                            </thead>
                            <tbody id="user-request-list" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 管理者画面 -->
            <section id="admin-view" class="hidden space-y-8">
                <div class="flex gap-2 p-1 bg-slate-100 rounded-xl w-fit">
                    <button onclick="switchAdminTab('requests')" id="admin-tab-req" class="px-6 py-2 text-sm font-bold bg-white text-indigo-600 rounded-lg shadow-sm flex items-center">
                        申請一覧
                        <span id="unprocessed-req-badge" class="count-badge hidden">0</span>
                    </button>
                    <button onclick="switchAdminTab('users')" id="admin-tab-users" class="px-6 py-2 text-sm font-bold text-slate-500 rounded-lg flex items-center">
                        ユーザー管理
                        <span id="unapproved-count-badge" class="count-badge hidden">0</span>
                    </button>
                </div>

                <div id="admin-requests-panel" class="soft-card overflow-hidden">
                    <div class="p-6 md:p-8 flex justify-between items-center border-b border-slate-50">
                        <h2 class="text-lg font-bold text-slate-700">精算管理パネル</h2>
                        <button onclick="exportToCSV()" class="text-xs bg-indigo-50 text-indigo-600 font-bold px-4 py-2 rounded-lg">CSV出力</button>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                            <input type="date" id="filter-start" oninput="renderAdminList()" class="px-4 py-2 text-sm input-elegant">
                            <input type="date" id="filter-end" oninput="renderAdminList()" class="px-4 py-2 text-sm input-elegant">
                            <input type="text" id="filter-keyword" oninput="renderAdminList()" placeholder="件名で検索..." class="px-4 py-2 text-sm input-elegant">
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="text-[10px] font-bold text-slate-400 uppercase border-b">
                                    <tr>
                                        <th class="px-4 py-4 text-left">管理番号</th>
                                        <th class="px-4 py-4 text-left">申請者</th>
                                        <th class="px-4 py-4 text-left">日付</th>
                                        <th class="px-4 py-4 text-left">件名</th>
                                        <th class="px-4 py-4 text-right">金額</th>
                                        <th class="px-4 py-4 text-center">状態</th>
                                        <th class="px-4 py-4 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-request-list" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ユーザー管理パネル -->
                <div id="admin-users-panel" class="hidden soft-card overflow-hidden">
                    <div class="p-8 border-b border-slate-50"><h2 class="text-lg font-bold text-slate-700">ユーザー管理</h2></div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="text-[10px] font-bold text-slate-400 uppercase bg-slate-50/50">
                                <tr>
                                    <th class="px-8 py-4">氏名</th>
                                    <th class="px-8 py-4">Email</th>
                                    <th class="px-8 py-4">状態</th>
                                    <th class="px-8 py-4 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="admin-user-list" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden fade-in">
            <div class="px-8 py-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-700">申請詳細</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
            </div>
            <div id="modal-content" class="p-8 space-y-6 max-h-[70vh] overflow-y-auto">
                <!-- JSで流し込み -->
            </div>
            <div class="px-8 py-6 border-t flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_ID = "tatatatamu0920@gmail.com";
        const ADMIN_PW = "Tamutamu0920";

        let currentUser = null;
        let requests = JSON.parse(localStorage.getItem('transport_requests_v4')) || [];
        let users = JSON.parse(localStorage.getItem('transport_users_v4')) || [];
        let savedBankInfo = JSON.parse(localStorage.getItem('bank_info_v4')) || {};

        // -----------------------------------------
        // 管理番号生成ロジック (6/1切り替え)
        // -----------------------------------------
        function generateManagementId() {
            const now = new Date();
            let year = now.getFullYear();
            if (now.getMonth() < 5) { // 0=1月, 5=6月。6/1前なら前年度
                year -= 1;
            }
            const yearStr = String(year).slice(-2);
            
            const sameYearPrefix = `${yearStr}-`;
            const countInYear = requests.filter(r => r.mgmtId && r.mgmtId.startsWith(sameYearPrefix)).length;
            const serial = String(countInYear + 1).padStart(3, '0');
            
            return `${yearStr}-${serial}`;
        }

        // -----------------------------------------
        // 認証関連
        // -----------------------------------------
        function updateIdDatalist() {
            const list = document.getElementById('id-list');
            list.innerHTML = '';
            // 管理者も候補に入れる
            const optionAdmin = document.createElement('option');
            optionAdmin.value = ADMIN_ID;
            list.appendChild(optionAdmin);
            
            // 承認済みのユーザーのみ候補に出す（必要に応じて未承認も出すならfilterを調整）
            users.forEach(u => {
                const option = document.createElement('option');
                option.value = u.email;
                list.appendChild(option);
            });
        }

        function switchAuthTab(type) {
            const isLogin = type === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').classList.toggle('bg-white', isLogin);
            document.getElementById('tab-login').classList.toggle('text-indigo-600', isLogin);
            document.getElementById('tab-register').classList.toggle('bg-white', !isLogin);
            document.getElementById('tab-register').classList.toggle('text-indigo-600', !isLogin);
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-id').value;
            const pw = document.getElementById('reg-pw').value;
            if (!name || !email || !pw) return showToast('入力を完了してください', 'error');
            if (users.some(u => u.email === email) || email === ADMIN_ID) return showToast('既に使用されています', 'error');
            
            users.push({ name, email, password: pw, status: '承認待ち' });
            saveUsers();
            showToast('利用申請を送りました');
            updateIdDatalist();
            switchAuthTab('login');
        }

        function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            if (id === ADMIN_ID && pw === ADMIN_PW) {
                currentUser = { id: ADMIN_ID, name: 'Master Admin', role: 'admin' };
                initApp(); return;
            }
            const user = users.find(u => u.email === id && u.password === pw);
            if (user) {
                if (user.status === '承認待ち') return showToast('アカウント承認をお待ちください', 'error');
                if (user.status === '却下') return showToast('利用申請が承認されませんでした', 'error');
                currentUser = { id: user.email, name: user.name, role: 'user' };
                initApp();
            } else {
                showToast('ログイン情報が正しくありません', 'error');
            }
        }

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `${currentUser.name} 様`;
            document.getElementById('role-badge').innerText = currentUser.role === 'admin' ? 'Administrator' : 'General User';
            if (currentUser.role === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
                document.getElementById('user-view').classList.add('hidden');
                updateBadges();
                renderAdminList();
                renderUserManagement();
            } else {
                document.getElementById('user-view').classList.remove('hidden');
                document.getElementById('admin-view').classList.add('hidden');
                autoFillBank();
                renderUserList();
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            updateIdDatalist();
        }

        // -----------------------------------------
        // 経費申請
        // -----------------------------------------
        function calculateAmount() {
            const price = parseInt(document.getElementById('unit-price').value) || 0;
            const total = document.getElementById('round-trip').checked ? price * 2 : price;
            document.getElementById('total-display').innerText = `¥ ${total.toLocaleString()}`;
            return total;
        }

        function autoFillBank() {
            if (savedBankInfo.bankName) {
                document.getElementById('bank-name').value = savedBankInfo.bankName;
                document.getElementById('branch-name').value = savedBankInfo.branchName;
                document.getElementById('account-number').value = savedBankInfo.accountNumber;
                document.getElementById('account-holder').value = savedBankInfo.accountHolder;
            }
        }

        document.getElementById('expense-form').onsubmit = function(e) {
            e.preventDefault();
            const bankData = {
                bankName: document.getElementById('bank-name').value,
                branchName: document.getElementById('branch-name').value,
                accountNumber: document.getElementById('account-number').value,
                accountHolder: document.getElementById('account-holder').value
            };
            localStorage.setItem('bank_info_v4', JSON.stringify(bankData));
            savedBankInfo = bankData;

            const newReq = {
                id: Date.now(),
                mgmtId: generateManagementId(),
                userId: currentUser.id,
                userName: currentUser.name,
                date: document.getElementById('date').value,
                subject: document.getElementById('subject').value,
                from: document.getElementById('from-station').value,
                to: document.getElementById('to-station').value,
                totalPrice: calculateAmount(),
                isRoundTrip: document.getElementById('round-trip').checked,
                bank: bankData,
                status: '申請中'
            };
            requests.unshift(newReq);
            localStorage.setItem('transport_requests_v4', JSON.stringify(requests));
            renderUserList();
            this.reset();
            calculateAmount();
            autoFillBank();
            showToast('申請を送信しました');
        };

        // -----------------------------------------
        // 表示更新 (管理者・ユーザー)
        // -----------------------------------------
        function renderUserList() {
            const list = document.getElementById('user-request-list');
            list.innerHTML = requests.filter(r => r.userId === currentUser.id).map(r => `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="px-8 py-5 text-[10px] font-bold text-indigo-500">#${r.mgmtId || '---'}</td>
                    <td class="px-8 py-5 text-xs text-slate-500 font-medium">${r.date}</td>
                    <td class="px-8 py-5 text-sm font-bold text-slate-700">${r.subject}</td>
                    <td class="px-8 py-5 text-right text-sm font-bold text-indigo-600">¥ ${r.totalPrice.toLocaleString()}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="status-badge ${r.status === '受理' ? 'bg-emerald-50 text-emerald-500' : 'bg-amber-50 text-amber-500'}">${r.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderAdminList() {
            const list = document.getElementById('admin-request-list');
            const keyword = document.getElementById('filter-keyword').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const filtered = requests.filter(r => {
                const matchesDate = (!start || r.date >= start) && (!end || r.date <= end);
                const matchesText = !keyword || r.subject.toLowerCase().includes(keyword);
                return matchesDate && matchesText;
            });
            list.innerHTML = filtered.map(r => `
                <tr class="hover:bg-slate-50/50">
                    <td class="px-4 py-5">
                        <button onclick="openDetail(${r.id})" class="text-[11px] font-bold text-indigo-600 hover:underline">#${r.mgmtId || '---'}</button>
                    </td>
                    <td class="px-4 py-5 font-bold text-slate-700">${r.userName}</td>
                    <td class="px-4 py-5 text-xs text-slate-500">${r.date}</td>
                    <td class="px-4 py-5 text-xs text-slate-600 truncate max-w-[120px]">${r.subject}</td>
                    <td class="px-4 py-5 text-right font-bold text-indigo-600">¥ ${r.totalPrice.toLocaleString()}</td>
                    <td class="px-4 py-5 text-center">
                        <span class="status-badge ${r.status === '受理' ? 'bg-emerald-50 text-emerald-500' : 'bg-amber-50 text-amber-500'}">${r.status}</span>
                    </td>
                    <td class="px-4 py-5 text-right">
                        ${r.status === '申請中' ? `<button onclick="approveRequest(${r.id})" class="text-[11px] font-bold text-white bg-indigo-600 px-3 py-1.5 rounded-lg">承認</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function openDetail(id) {
            const r = requests.find(req => req.id === id);
            if (!r) return;
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">申請情報</span>
                        <span class="text-xs font-bold text-indigo-600">管理番号: #${r.mgmtId}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold mb-1">申請者</p><p class="font-bold">${r.userName}</p></div>
                        <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold mb-1">日付</p><p class="font-bold">${r.date}</p></div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">件名 / 区間</p>
                        <p class="font-bold">${r.subject}</p>
                        <p class="text-xs text-slate-500 mt-1">${r.from} → ${r.to}${r.isRoundTrip ? ' (往復)' : ''}</p>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-2xl flex justify-between items-center">
                        <p class="text-[10px] text-indigo-400 font-bold">合計金額</p>
                        <p class="text-xl font-bold text-indigo-600">¥ ${r.totalPrice.toLocaleString()}</p>
                    </div>
                    <div class="border-t pt-4">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 block">振込先詳細</span>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-slate-400">銀行名</span><span>${r.bank.bankName}</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">支店名</span><span>${r.bank.branchName}</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">口座番号</span><span>${r.bank.accountNumber}</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">名義</span><span>${r.bank.accountHolder}</span></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

        function approveRequest(id) {
            const req = requests.find(r => r.id === id);
            if (req) {
                req.status = '受理';
                localStorage.setItem('transport_requests_v4', JSON.stringify(requests));
                renderAdminList();
                updateBadges();
                showToast('申請を承認しました');
            }
        }

        function updateBadges() {
            const unapprovedUsers = users.filter(u => u.status === '承認待ち').length;
            const userBadge = document.getElementById('unapproved-count-badge');
            userBadge.innerText = unapprovedUsers;
            userBadge.classList.toggle('hidden', unapprovedUsers === 0);

            const unproccessedReqs = requests.filter(r => r.status === '申請中').length;
            const reqBadge = document.getElementById('unprocessed-req-badge');
            reqBadge.innerText = unproccessedReqs;
            reqBadge.classList.toggle('hidden', unproccessedReqs === 0);
        }

        // -----------------------------------------
        // ユーザー管理
        // -----------------------------------------
        function renderUserManagement() {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = users.map(u => `
                <tr>
                    <td class="px-8 py-5 font-bold text-slate-700">${u.name}</td>
                    <td class="px-8 py-5 text-slate-400 text-xs">${u.email}</td>
                    <td class="px-8 py-5">
                        <span class="status-badge ${u.status === '承認済み' ? 'bg-emerald-50 text-emerald-500' : u.status === '却下' ? 'bg-rose-50 text-rose-500' : 'bg-amber-50 text-amber-500'}">${u.status}</span>
                    </td>
                    <td class="px-8 py-5 text-right space-x-2">
                        ${u.status === '承認待ち' ? `
                            <button onclick="setUserStatus('${u.email}', '承認済み')" class="text-xs font-bold text-emerald-600">承認</button>
                            <span class="text-slate-200">|</span>
                            <button onclick="setUserStatus('${u.email}', '却下')" class="text-xs font-bold text-rose-400">却下</button>
                        ` : `
                            <button onclick="deleteUser('${u.email}')" class="text-xs font-bold text-slate-400 hover:text-rose-500">削除</button>
                        `}
                    </td>
                </tr>
            `).join('');
        }

        function setUserStatus(email, status) {
            const uIdx = users.findIndex(u => u.email === email);
            if (uIdx !== -1) {
                users[uIdx].status = status;
                saveUsers();
                renderUserManagement();
                updateBadges();
                showToast(`ユーザーを${status}にしました`);
            }
        }

        function deleteUser(email) {
            if (confirm(`ユーザー ${email} を削除しますか？`)) {
                users = users.filter(u => u.email !== email);
                saveUsers();
                renderUserManagement();
                updateBadges();
                updateIdDatalist();
                showToast('削除しました');
            }
        }

        function saveUsers() { localStorage.setItem('transport_users_v4', JSON.stringify(users)); }

        // -----------------------------------------
        // ユーティリティ
        // -----------------------------------------
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl shadow-xl z-50 text-sm font-bold border ${type === 'success' ? 'bg-white text-indigo-600 border-indigo-100' : 'bg-rose-50 text-rose-600 border-rose-100'} fade-in`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
        }

        function switchAdminTab(type) {
            const isReq = type === 'requests';
            document.getElementById('admin-requests-panel').classList.toggle('hidden', !isReq);
            document.getElementById('admin-users-panel').classList.toggle('hidden', isReq);
            const reqTab = document.getElementById('admin-tab-req');
            const userTab = document.getElementById('admin-tab-users');
            reqTab.className = isReq ? "px-6 py-2 text-sm font-bold bg-white text-indigo-600 rounded-lg shadow-sm flex items-center" : "px-6 py-2 text-sm font-bold text-slate-500 rounded-lg flex items-center";
            userTab.className = !isReq ? "px-6 py-2 text-sm font-bold bg-white text-indigo-600 rounded-lg shadow-sm flex items-center" : "px-6 py-2 text-sm font-bold text-slate-500 rounded-lg flex items-center";
        }

        function exportToCSV() {
            if (requests.length === 0) return;
            const headers = ['管理番号', '日付', '氏名', '件名', '金額', 'ステータス'];
            const rows = requests.map(r => [r.mgmtId, r.date, r.userName, `"${r.subject}"`, r.totalPrice, r.status]);
            const csv = [headers, ...rows].map(e => e.join(",")).join("\n");
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `transport_expenses.csv`;
            link.click();
        }

        // 初期実行
        window.onload = function() {
            document.getElementById('date').valueAsDate = new Date();
            updateIdDatalist();
        };
    </script>
</body>
</html>
