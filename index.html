<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通費申請システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="app" class="max-w-4xl mx-auto py-8 px-4">
        <!-- ログイン画面 -->
        <div id="login-screen" class="max-w-md mx-auto mt-20 p-8 glass-morphism rounded-2xl shadow-xl">
            <h1 class="text-2xl font-bold text-center mb-6 text-indigo-700">交通費申請システム</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">ユーザーID</label>
                    <input type="text" id="login-id" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="admin or user">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">パスワード</label>
                    <input type="password" id="login-pw" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="admin or user">
                </div>
                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition-colors">ログイン</button>
                <p class="text-xs text-slate-500 text-center mt-4">テスト用：admin/admin または user/user</p>
            </div>
        </div>

        <!-- メインコンテンツ（ログイン後） -->
        <div id="main-content" class="hidden">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900" id="welcome-msg">こんにちは</h1>
                    <p class="text-slate-500" id="role-badge"></p>
                </div>
                <button onclick="handleLogout()" class="text-slate-500 hover:text-red-500 text-sm font-medium">ログアウト</button>
            </header>

            <!-- ユーザー用：申請フォーム -->
            <section id="user-view" class="hidden space-y-6">
                <div class="p-6 glass-morphism rounded-xl shadow-md">
                    <h2 class="text-lg font-bold mb-4 flex items-center">
                        <span class="w-2 h-6 bg-indigo-500 rounded mr-2"></span>
                        新規交通費申請
                    </h2>
                    <form id="expense-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-1">
                            <label class="block text-sm font-medium mb-1">日付</label>
                            <input type="date" id="date" required class="w-full px-3 py-2 border rounded-lg">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium mb-1">件名 (例: A社定期訪問)</label>
                            <input type="text" id="subject" required class="w-full px-3 py-2 border rounded-lg">
                        </div>
                        
                        <div class="col-span-2 border-t pt-4 mt-2">
                            <h3 class="text-sm font-bold text-slate-600 mb-2">振込先情報 (保存されます)</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" id="bank-info" placeholder="銀行名・支店名" required class="px-3 py-2 border rounded-lg">
                                <input type="text" id="account-info" placeholder="口座番号・名義" required class="px-3 py-2 border rounded-lg">
                            </div>
                        </div>

                        <div class="col-span-2 border-t pt-4 mt-2">
                            <div class="flex items-center space-x-4 mb-4">
                                <label class="inline-flex items-center">
                                    <input type="radio" name="transport" value="電車" checked class="form-radio text-indigo-600">
                                    <span class="ml-2">電車</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="radio" name="transport" value="バス" class="form-radio text-indigo-600">
                                    <span class="ml-2">バス</span>
                                </label>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs font-bold text-indigo-600 mb-1">【往路】</p>
                                    <input type="text" id="from-station" placeholder="乗車点" required class="w-full px-3 py-2 border rounded-lg mb-2">
                                    <input type="text" id="to-station" placeholder="目的地" required class="w-full px-3 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <div class="flex justify-between items-center mb-1">
                                        <p class="text-xs font-bold text-indigo-600">【復路】</p>
                                        <label class="inline-flex items-center text-xs text-slate-500 cursor-pointer">
                                            <input type="checkbox" id="round-trip" onchange="toggleReturnTrip()" class="form-checkbox">
                                            <span class="ml-1 font-bold">往復（往路と同じ）</span>
                                        </label>
                                    </div>
                                    <div id="return-inputs">
                                        <input type="text" id="return-from" placeholder="乗車点" class="w-full px-3 py-2 border rounded-lg mb-2">
                                        <input type="text" id="return-to" placeholder="目的地" class="w-full px-3 py-2 border rounded-lg">
                                    </div>
                                    <div id="return-placeholder" class="hidden h-20 flex items-center justify-center border-2 border-dashed rounded-lg text-slate-400 text-sm">
                                        往復のため入力を省略
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-span-2 mt-4">
                            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg">申請する</button>
                        </div>
                    </form>
                </div>

                <div class="p-6 glass-morphism rounded-xl shadow-md">
                    <h2 class="text-lg font-bold mb-4">自分の申請一覧</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b text-slate-500 text-sm">
                                    <th class="py-2">日付</th>
                                    <th class="py-2">件名</th>
                                    <th class="py-2">区間</th>
                                    <th class="py-2">ステータス</th>
                                </tr>
                            </thead>
                            <tbody id="user-request-list">
                                <!-- JSで挿入 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 管理者用：申請一覧 -->
            <section id="admin-view" class="hidden space-y-6">
                <div class="p-6 glass-morphism rounded-xl shadow-md">
                    <h2 class="text-lg font-bold mb-4">管理者用：承認待ち一覧</h2>
                    
                    <!-- フィルタ -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 p-4 bg-slate-50 rounded-lg">
                        <div>
                            <label class="block text-xs font-bold mb-1">期間（開始）</label>
                            <input type="date" id="filter-start" oninput="renderAdminList()" class="w-full px-3 py-1 text-sm border rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">期間（終了）</label>
                            <input type="date" id="filter-end" oninput="renderAdminList()" class="w-full px-3 py-1 text-sm border rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">件名フィルタ</label>
                            <input type="text" id="filter-subject" oninput="renderAdminList()" placeholder="キーワード検索" class="w-full px-3 py-1 text-sm border rounded">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b text-slate-500 text-sm">
                                    <th class="py-2">申請者</th>
                                    <th class="py-2">日付 (修正可)</th>
                                    <th class="py-2">件名 (修正可)</th>
                                    <th class="py-2">区間</th>
                                    <th class="py-2">振込先</th>
                                    <th class="py-2">アクション</th>
                                </tr>
                            </thead>
                            <tbody id="admin-request-list" class="text-sm">
                                <!-- JSで挿入 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let currentUser = null;
        let requests = [];
        // 振込先情報の簡易永続化（リロードすると消えますが、セッション中は維持）
        let savedBankInfo = {
            bank: '',
            account: ''
        };

        // ダミーデータ
        const INITIAL_DATA = [
            { id: 1, userId: 'user', userName: '一般ユーザー', date: '2023-10-01', subject: 'A社商談', transport: '電車', from: '新宿', to: '渋谷', isRoundTrip: true, bank: 'みずほ銀行', account: '1234567', status: '受理' },
            { id: 2, userId: 'user', userName: '一般ユーザー', date: '2023-10-05', subject: '備品買い出し', transport: 'バス', from: '中野', to: '高円寺', isRoundTrip: false, returnFrom: '高円寺', returnTo: '中野', bank: 'みずほ銀行', account: '1234567', status: '申請中' }
        ];
        requests = [...INITIAL_DATA];

        // --- ログイン処理 ---
        function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;

            if (id === 'admin' && pw === 'admin') {
                currentUser = { id: 'admin', name: '管理者', role: 'admin' };
            } else if (id === 'user' && pw === 'user') {
                currentUser = { id: 'user', name: '一般ユーザー', role: 'user' };
            } else {
                showMessage('IDまたはパスワードが違います');
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `こんにちは、${currentUser.name}さん`;
            document.getElementById('role-badge').innerText = currentUser.role === 'admin' ? '管理者権限' : '一般ユーザー';
            
            if (currentUser.role === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
                document.getElementById('user-view').classList.add('hidden');
                renderAdminList();
            } else {
                document.getElementById('user-view').classList.remove('hidden');
                document.getElementById('admin-view').classList.add('hidden');
                autoFillBankInfo();
                renderUserList();
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('expense-form').reset();
        }

        // --- フォーム制御 ---
        function toggleReturnTrip() {
            const isRoundTrip = document.getElementById('round-trip').checked;
            const inputs = document.getElementById('return-inputs');
            const placeholder = document.getElementById('return-placeholder');
            
            if (isRoundTrip) {
                inputs.classList.add('hidden');
                placeholder.classList.remove('hidden');
                document.getElementById('return-from').required = false;
                document.getElementById('return-to').required = false;
            } else {
                inputs.classList.remove('hidden');
                placeholder.classList.add('hidden');
                document.getElementById('return-from').required = true;
                document.getElementById('return-to').required = true;
            }
        }

        function autoFillBankInfo() {
            if (savedBankInfo.bank) {
                document.getElementById('bank-info').value = savedBankInfo.bank;
                document.getElementById('account-info').value = savedBankInfo.account;
            }
        }

        // --- 申請処理 ---
        document.getElementById('expense-form').onsubmit = function(e) {
            e.preventDefault();
            
            // 振込先情報を保存
            savedBankInfo.bank = document.getElementById('bank-info').value;
            savedBankInfo.account = document.getElementById('account-info').value;

            const newRequest = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                date: document.getElementById('date').value,
                subject: document.getElementById('subject').value,
                bank: savedBankInfo.bank,
                account: savedBankInfo.account,
                transport: document.querySelector('input[name="transport"]:checked').value,
                from: document.getElementById('from-station').value,
                to: document.getElementById('to-station').value,
                isRoundTrip: document.getElementById('round-trip').checked,
                returnFrom: document.getElementById('return-from').value,
                returnTo: document.getElementById('return-to').value,
                status: '申請中'
            };

            requests.unshift(newRequest);
            renderUserList();
            this.reset();
            toggleReturnTrip();
            autoFillBankInfo();
            showMessage('申請が完了しました');
        };

        // --- 描画処理 ---
        function renderUserList() {
            const list = document.getElementById('user-request-list');
            const userRequests = requests.filter(r => r.userId === currentUser.id);
            
            list.innerHTML = userRequests.map(r => `
                <tr class="border-b hover:bg-white/50 transition">
                    <td class="py-3">${r.date}</td>
                    <td class="py-3 font-medium">${r.subject}</td>
                    <td class="py-3 text-xs text-slate-600">
                        ${r.from} ↔ ${r.to} (${r.transport}${r.isRoundTrip ? '/往復' : '/片道'})
                    </td>
                    <td class="py-3">
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${r.status === '受理' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                            ${r.status}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function renderAdminList() {
            const list = document.getElementById('admin-request-list');
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const sub = document.getElementById('filter-subject').value.toLowerCase();

            const filtered = requests.filter(r => {
                const matchesDate = (!start || r.date >= start) && (!end || r.date <= end);
                const matchesSubject = !sub || r.subject.toLowerCase().includes(sub);
                return matchesDate && matchesSubject;
            });

            list.innerHTML = filtered.map(r => `
                <tr class="border-b bg-white">
                    <td class="py-4 px-2 font-bold text-indigo-600">${r.userName}</td>
                    <td class="py-4 px-2">
                        <input type="date" value="${r.date}" onchange="updateRequest(${r.id}, 'date', this.value)" class="border rounded px-1 text-xs">
                    </td>
                    <td class="py-4 px-2">
                        <input type="text" value="${r.subject}" onchange="updateRequest(${r.id}, 'subject', this.value)" class="border rounded px-1 text-xs w-full">
                    </td>
                    <td class="py-4 px-2 text-xs">
                        ${r.transport}: ${r.from} → ${r.to}<br>
                        ${r.isRoundTrip ? '(往復)' : '復路: ' + r.returnFrom + ' → ' + r.returnTo}
                    </td>
                    <td class="py-4 px-2 text-[10px] text-slate-500">
                        ${r.bank}<br>${r.account}
                    </td>
                    <td class="py-4 px-2">
                        ${r.status === '申請中' 
                            ? `<button onclick="approveRequest(${r.id})" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-xs font-bold transition">受理する</button>`
                            : `<span class="text-green-600 font-bold">✓ 受理済み</span>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        // --- 管理者アクション ---
        function approveRequest(id) {
            const req = requests.find(r => r.id === id);
            if (req) {
                req.status = '受理';
                renderAdminList();
            }
        }

        function updateRequest(id, field, value) {
            const req = requests.find(r => r.id === id);
            if (req) {
                req[field] = value;
                console.log(`Updated ${field} for request ${id} to ${value}`);
            }
        }

        // --- ユーティリティ ---
        function showMessage(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 text-sm font-medium';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
