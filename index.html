<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseFlow - 交通費申請システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="app" class="min-h-screen">
        <!-- Auth Screen (Loading/Login) -->
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
                <div class="text-center mb-8">
                    <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                        <i data-lucide="clipboard-list" class="text-white w-8 h-8"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">ExpenseFlow</h1>
                    <p id="auth-subtitle" class="text-slate-500 mt-2 text-sm">おかえりなさい！ログインしてください</p>
                </div>

                <div id="auth-error" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-start gap-3 text-red-600 text-sm">
                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <span id="error-message"></span>
                </div>

                <form id="auth-form" class="space-y-4">
                    <div id="name-field" class="hidden">
                        <label class="block text-sm font-medium text-slate-700 mb-1">お名前</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input type="text" id="display-name" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="山田 太郎">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input type="email" id="email" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="name@company.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">パスワード</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors shadow-md active:scale-95 mt-4">
                        ログイン
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <button id="toggle-auth-mode" class="text-sm text-blue-600 font-medium hover:underline">
                        アカウントを新規作成する
                    </button>
                </div>
            </div>
        </div>

        <!-- Main App Screen -->
        <div id="main-screen" class="hidden min-h-screen">
            <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
                <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="bg-blue-600 p-1.5 rounded-lg">
                            <i data-lucide="clipboard-list" class="text-white w-5 h-5"></i>
                        </div>
                        <span class="font-bold text-lg tracking-tight">ExpenseFlow</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex flex-col items-end mr-2 text-right">
                            <span id="user-display-name" class="text-sm font-semibold text-slate-700"></span>
                            <span id="user-role-badge" class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">USER</span>
                        </div>
                        <button id="logout-btn" class="p-2 hover:bg-red-50 rounded-full text-slate-500 hover:text-red-500 transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </nav>

            <main class="max-w-4xl mx-auto p-4 pb-24">
                <div class="flex gap-2 mb-6 bg-slate-200/50 p-1 rounded-xl w-fit">
                    <button id="tab-list" class="px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-blue-600">一覧</button>
                    <button id="tab-new" class="px-6 py-2 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-700">新規申請</button>
                </div>

                <!-- List View -->
                <div id="view-list" class="space-y-4">
                    <div id="loading-spinner" class="text-center py-20">
                        <div class="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-4"></div>
                        <p class="text-slate-400">読み込み中...</p>
                    </div>
                    <div id="empty-state" class="hidden text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
                        <i data-lucide="clipboard-list" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                        <p class="text-slate-500 font-medium">申請データが見つかりません</p>
                    </div>
                    <div id="requests-container" class="space-y-4"></div>
                </div>

                <!-- New Request Form -->
                <div id="view-new" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5 text-blue-600"></i>
                        <h2 class="font-bold text-lg">交通費の新規申請</h2>
                    </div>
                    <form id="request-form" class="p-6 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-2 flex items-center gap-1.5">
                                    <i data-lucide="calendar" class="w-4 h-4"></i> 日付
                                </label>
                                <input type="date" id="req-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-2">件名 / 目的</label>
                                <input type="text" id="req-subject" required placeholder="例: A社 定期打ち合わせ" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-2xl space-y-4 border border-slate-100">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-2 flex items-center gap-1.5">
                                        <i data-lucide="map-pin" class="w-4 h-4"></i> 乗車駅
                                    </label>
                                    <input type="text" id="req-origin" required placeholder="出発駅" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-2 flex items-center gap-1.5">
                                        <i data-lucide="map-pin" class="w-4 h-4 text-red-400"></i> 目的地の駅
                                    </label>
                                    <input type="text" id="req-destination" required placeholder="到着駅" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                            </div>
                            <div class="flex items-center gap-3 pt-2">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="req-roundtrip" checked class="sr-only peer">
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                                <span class="text-sm font-medium text-slate-700">往復申請にする</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">金額 (税込)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-semibold">¥</span>
                                <input type="number" id="req-amount" required placeholder="0" class="w-full pl-8 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <div class="flex gap-3 pt-4">
                            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                                <i data-lucide="plus" class="w-5 h-5"></i> 申請を送信
                            </button>
                            <button type="button" onclick="switchTab('list')" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all">キャンセル</button>
                        </div>
                    </form>
                </div>
            </main>

            <div id="admin-indicator" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-2 rounded-full shadow-2xl flex items-center gap-2 text-xs font-bold border border-slate-700">
                <i data-lucide="settings" class="w-3 h-3"></i> ADMIN MODE
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'transport-expense-system';

        // State
        let currentUser = null;
        let isAdmin = false;
        let authMode = 'login'; // 'login' or 'signup'
        let unsubscribeRequests = null;

        // Elements
        const authScreen = document.getElementById('auth-screen');
        const mainScreen = document.getElementById('main-screen');
        const authForm = document.getElementById('auth-form');
        const toggleAuthBtn = document.getElementById('toggle-auth-mode');
        const authErrorBox = document.getElementById('auth-error');
        const requestsContainer = document.getElementById('requests-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const emptyState = document.getElementById('empty-state');

        // Init Lucide
        const refreshIcons = () => lucide.createIcons();
        refreshIcons();

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                isAdmin = (user.email?.toLowerCase().includes('admin') || user.displayName?.toLowerCase().includes('admin'));
                document.getElementById('user-display-name').textContent = user.displayName || user.email || 'ゲスト';
                document.getElementById('user-role-badge').textContent = isAdmin ? 'ADMIN MODE' : 'USER';
                document.getElementById('admin-indicator').classList.toggle('hidden', !isAdmin);
                
                authScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                startFirestoreListener();
            } else {
                mainScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
                if (unsubscribeRequests) unsubscribeRequests();
            }
        });

        // Toggle Auth Mode
        toggleAuthBtn.onclick = () => {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('name-field').classList.toggle('hidden', authMode === 'login');
            document.getElementById('auth-subtitle').textContent = authMode === 'login' ? 'おかえりなさい！ログインしてください' : '新しくアカウントを作成します';
            document.getElementById('auth-submit-btn').textContent = authMode === 'login' ? 'ログイン' : 'アカウント作成';
            toggleAuthBtn.textContent = authMode === 'login' ? 'アカウントを新規作成する' : '既にアカウントをお持ちの方';
            authErrorBox.classList.add('hidden');
        };

        // Handle Auth Submission
        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('display-name').value;
            
            authErrorBox.classList.add('hidden');

            try {
                if (authMode === 'signup') {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                console.error("Auth Error:", err.code);
                if (err.code === 'auth/operation-not-allowed') {
                    // Fallback to anonymous if email auth is disabled
                    try {
                        const cred = await signInAnonymously(auth);
                        await updateProfile(cred.user, { displayName: displayName || email.split('@')[0] });
                    } catch (e) {
                        showAuthError("認証機能が制限されています。");
                    }
                } else {
                    showAuthError(getErrorMessage(err.code));
                }
            }
        };

        function getErrorMessage(code) {
            switch(code) {
                case 'auth/email-already-in-use': return "このメールは既に使用されています。";
                case 'auth/invalid-email': return "無効なメール形式です。";
                case 'auth/weak-password': return "パスワードは6文字以上にしてください。";
                case 'auth/wrong-password': 
                case 'auth/user-not-found': return "メールまたはパスワードが正しくありません。";
                default: return "エラーが発生しました。再度お試しください。";
            }
        }

        function showAuthError(msg) {
            authErrorBox.classList.remove('hidden');
            document.getElementById('error-message').textContent = msg;
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Tabs
        window.switchTab = (tab) => {
            document.getElementById('view-list').classList.toggle('hidden', tab !== 'list');
            document.getElementById('view-new').classList.toggle('hidden', tab !== 'new');
            document.getElementById('tab-list').className = tab === 'list' ? 'px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-blue-600' : 'px-6 py-2 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-700';
            document.getElementById('tab-new').className = tab === 'new' ? 'px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-blue-600' : 'px-6 py-2 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-700';
        };

        document.getElementById('tab-list').onclick = () => switchTab('list');
        document.getElementById('tab-new').onclick = () => {
            document.getElementById('req-date').value = new Date().toISOString().split('T')[0];
            switchTab('new');
        };

        // Firestore Logic
        function startFirestoreListener() {
            loadingSpinner.classList.remove('hidden');
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'requests');
            
            unsubscribeRequests = onSnapshot(colRef, (snapshot) => {
                loadingSpinner.classList.add('hidden');
                const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                renderRequests(data);
            }, (err) => {
                console.error("Firestore Error:", err);
                loadingSpinner.classList.add('hidden');
            });
        }

        function renderRequests(data) {
            const filtered = isAdmin ? data : data.filter(r => r.userId === currentUser.uid);
            requestsContainer.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            filtered.forEach(req => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded-xl ${req.status === 'approved' ? 'bg-green-50 text-green-600' : 'bg-orange-50 text-orange-600'}">
                                <i data-lucide="${req.status === 'approved' ? 'check-circle-2' : 'clock'}" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 leading-tight">${req.subject}</h3>
                                <div class="flex items-center gap-2 text-xs text-slate-400 mt-1">
                                    <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600 font-medium">${req.date}</span>
                                    ${isAdmin ? `<span class="flex items-center gap-1 font-bold"><i data-lucide="user" class="w-3 h-3"></i> ${req.userName}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-black text-slate-900">¥${Number(req.amount).toLocaleString()}</div>
                            <div class="text-[10px] font-bold uppercase tracking-widest mt-1 ${req.status === 'approved' ? 'text-green-500' : 'text-orange-500'}">
                                ${req.status === 'approved' ? '受領済み' : '申請中'}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 px-4 py-3 rounded-xl mb-4 text-sm">
                        <div class="font-bold text-slate-700">${req.origin}</div>
                        <i data-lucide="arrow-right-left" class="w-3 h-3 text-slate-300 ${!req.isRoundTrip ? 'rotate-45' : ''}"></i>
                        <div class="font-bold text-slate-700">${req.destination}</div>
                        ${req.isRoundTrip ? `<span class="ml-auto bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold">往復</span>` : ''}
                    </div>
                    ${isAdmin && req.status === 'pending' ? `
                        <div class="flex gap-2 pt-2 border-t border-slate-100 mt-2">
                            <button onclick="updateStatus('${req.id}', 'approved')" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition-colors flex items-center justify-center gap-1">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i> 承認する
                            </button>
                        </div>
                    ` : ''}
                `;
                requestsContainer.appendChild(card);
            });
            refreshIcons();
        }

        window.updateStatus = async (id, status) => {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'requests', id);
                await updateDoc(docRef, { status });
            } catch (e) { console.error(e); }
        };

        // Form Submit
        document.getElementById('request-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'requests');
                await addDoc(colRef, {
                    date: document.getElementById('req-date').value,
                    subject: document.getElementById('req-subject').value,
                    origin: document.getElementById('req-origin').value,
                    destination: document.getElementById('req-destination').value,
                    isRoundTrip: document.getElementById('req-roundtrip').checked,
                    amount: document.getElementById('req-amount').value,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email || 'ゲスト',
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                
                document.getElementById('request-form').reset();
                switchTab('list');
            } catch (err) {
                console.error("Submit Error:", err);
            }
        };

        // Set Default Custom Token Login if exists
        const initCustomAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e){}
            }
        };
        initCustomAuth();
    </script>
</body>
</html>
